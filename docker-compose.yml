version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env # This securely passes your OpenAI key into the container
    volumes:
      # This links your local backend folder to the container so you can see live code changes
      - ./backend:/app 

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend # Tells Docker to start the backend before the frontend